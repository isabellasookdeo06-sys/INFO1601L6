<!DOCTYPE html>
<html>
  <head>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <title>Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  </head>

  <body>
    <nav>
        <div class="nav-wrapper teal" style="padding-left: 10px;">
           <a href="#!" class="brand-logo">Ajax Demo</a>
        </div>
    </nav>
    <main class="row" style="padding: 40px">
         <table>
           <thead>
                <tr>
                   <th>#</th>
                   <th>name</th>
                   <th>Type</th>
                   <th>website</th>
                </tr>
                </thead>
                  <tbody id="result">
                                                
                  </tbody>
           </table>
     </main>
     <script>
      function drawTable(records){
    let result = document.querySelector('#result');
    let html = '';
    for(let record of records){
        html += `<tr>
          <td>${record.id}</td>
          <td>${record.name}</td>
          <td>${record.brewery_type}</td>
          <td>${record.website_url}</td>    
        </tr>`;
    }
    result.innerHTML = html;
}

//testing the function with sample data
drawTable([{
   id: 1,
   name: "bob's",
   brewery_type: "fire",
   website_url:"https://bobs.com"
}]);

// Task 6.2: Fetch data from API and render it
async function getData(url){
   try{
       let response = await fetch(url);      // Send request
       let result = await response.json();    // Parse JSON response
       drawTable(result);                     // Render into table
   } catch(e){
       console.log(e);                        // Log any errors
   }
}

// Call getData with the breweries API
getData("https://api.openbrewerydb.org/breweries/search?query=harry");
  </script>
</body>
</html>
